spring.application.name=earnsafe-backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/earnsafe_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:change-me-in-production}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Server
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/api

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# OpenWeatherMap
app.weather.api.key=${WEATHER_API_KEY:}
app.weather.api.url=${WEATHER_API_URL:https://api.openweathermap.org/data/2.5}
app.weather.timeout-ms=${WEATHER_TIMEOUT_MS:8000}

# External AI inference service
app.ai.base-url=${AI_BASE_URL:http://localhost:8000}
app.ai.timeout-ms=${AI_TIMEOUT_MS:8000}

# Payout provider (Stripe test mode)
app.payout.provider=${PAYOUT_PROVIDER:stripe}
app.payout.stripe.api-key=${STRIPE_API_KEY:}
app.payout.stripe.destination-account=${STRIPE_DESTINATION_ACCOUNT:}
app.payout.timeout-ms=${PAYOUT_TIMEOUT_MS:8000}

# Seed data
app.seed.enabled=${APP_SEED_ENABLED:true}

# Automatic trigger scheduler interval in ms (default 5 min)
app.trigger.interval=${TRIGGER_INTERVAL_MS:300000}

# Logging
logging.level.com.earnsafe=INFO
logging.level.org.springframework.security=WARN

spring.application.name=earnsafe-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/earnsafe_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# Server
server.port=8081
server.servlet.context-path=/api

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# OpenWeatherMap (optional)
app.weather.api.key=${WEATHER_API_KEY:}
app.weather.api.url=https://api.openweathermap.org/data/2.5

# Seed data
app.seed.enabled=true

# Automatic trigger scheduler interval in ms (default 5 min)
app.trigger.interval=300000

# Logging
logging.level.com.earnsafe=INFO
logging.level.org.springframework.security=WARN
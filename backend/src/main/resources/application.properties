spring.application.name=earnsafe-backend

# ── Database Configuration ──
spring.datasource.url=jdbc:mysql://localhost:3306/earnsafe_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Shankar@4
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA Configuration ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT Configuration ──
app.jwt.secret=EarnSafe2026SecretKeyForJWTAuthenticationMustBeAtLeast256BitsLong
app.jwt.expiration=86400000

# ── Server ──
server.port=8081
server.servlet.context-path=/api

# ── CORS ──
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── OpenWeatherMap ──
app.weather.api.key=1fb52cc4dfc365cc18936baec9784c31
app.weather.api.url=https://api.openweathermap.org/data/2.5
app.weather.timeout-ms=8000

# ── AI Service ──
app.ai.base-url=http://localhost:8000
app.ai.timeout-ms=8000

# ── Stripe (Payout) ──
app.payout.provider=stripe
app.payout.stripe.api-key=
app.payout.stripe.destination-account=
app.payout.timeout-ms=8000

# ── Seed Data ──
app.seed.enabled=true

# ── Scheduler ──
app.trigger.interval=300000

# ── Logging ──
logging.level.com.earnsafe=INFO
logging.level.org.springframework.security=WARN
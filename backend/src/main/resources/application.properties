spring.application.name=gigshield-backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gigshield_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:GigShield2026SecretKeyForJWTAuthenticationMustBeAtLeast256BitsLong}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Server
server.port=${PORT:8080}
server.servlet.context-path=/api

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# OpenWeatherMap (optional)
app.weather.api.key=${WEATHER_API_KEY:}
app.weather.api.url=https://api.openweathermap.org/data/2.5

# Seed data
app.seed.enabled=${SEED_DATA:true}

# Logging
logging.level.com.gigshield=INFO
logging.level.org.springframework.security=WARN

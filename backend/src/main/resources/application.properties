spring.application.name=earnsafe-backend

# ── Database Configuration ──
spring.datasource.url=jdbc:mysql://localhost:3306/earnsafe_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA Configuration ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT Configuration ──
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ── Server ──
server.port=8081
server.servlet.context-path=/api

# ── CORS ──
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── OpenWeatherMap ──
app.weather.api.key=${WEATHER_API_KEY:}
app.weather.api.url=https://api.openweathermap.org/data/2.5
app.weather.timeout-ms=8000

# ── AI Service ──
app.ai.base-url=http://localhost:8000
app.ai.timeout-ms=8000

# ── Stripe (Payout) ──
app.payout.provider=stripe
app.payout.stripe.api-key=${STRIPE_API_KEY:}
app.payout.stripe.destination-account=${STRIPE_DESTINATION_ACCOUNT:}
app.payout.timeout-ms=8000
app.payout.retry.max-attempts=${PAYOUT_RETRY_MAX_ATTEMPTS:3}

# ── Fraud Detection ──
app.fraud.location-threshold-km=${FRAUD_LOCATION_THRESHOLD_KM:35}
app.fraud.max-claims-24h=${FRAUD_MAX_CLAIMS_24H:2}
app.fraud.max-claims-7d=${FRAUD_MAX_CLAIMS_7D:4}

# ── Seed Data ──
app.seed.enabled=true

# ── Scheduler ──
app.trigger.interval=300000

# ── Logging ──
logging.level.com.earnsafe=INFO
logging.level.org.springframework.security=WARN
